<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        International Resume Analyzer
    </title>

    <link
        rel="stylesheet"
        href="style.css">

</head>

<script src="script.js"></script>
<body>

    <header>

        <h1>
            International Resume Analyzer
        </h1>

        <p>
            Optimize your resume for global job markets.
            Upload your resume and receive
            continent-specific recommendations.
        </p>

    </header>

    <main>

        <section class="upload-container">

            <h2>
                Upload Resume
            </h2>

            <input
                type="file"
                id="resumeUpload"
                accept=".pdf,.doc,.docx">

            <label
                for="continent">

                Target Region

            </label>

            <select id="continent">

                <option value="">
                    Select Region
                </option>

                <option>
                    North America
                </option>

                <option>
                    Europe
                </option>

                <option>
                    Asia
                </option>

                <option>
                    Africa
                </option>

                <option>
                    South America
                </option>

                <option>
                    Oceania
                </option>

            </select>

            <button id="analyzeBtn">

                Analyze Resume

            </button>

        </section>

        <section
            id="feedbackBox">

            <h2>

                Feedback

            </h2>

            <p>

                Upload your resume
                and choose a target region.

            </p>

        </section>

    </main>

    <footer>

        <p>

            Senior Capstone Project
            • Computer Science
            • St. Bonaventure University

        </p>

    </footer>

</body>

</html>
